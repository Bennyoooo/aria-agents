<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="dotGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded background -->
  <rect width="120" height="120" rx="26" fill="#0c0c1d"/>
  <!-- Subtle border glow -->
  <rect x="1" y="1" width="118" height="118" rx="25" stroke="#6d5aed" stroke-width="1" opacity="0.2" fill="none"/>
  <!-- Lowercase a in light color -->
  <text x="16" y="93" font-family="Georgia, 'Times New Roman', serif" font-size="92" font-weight="600" fill="#e4e4ef">a</text>
  <!-- Indigo gradient dot -->
  <circle cx="93" cy="80" r="12" fill="url(#dotGrad)"/>
</svg>
